# Rounds end-to-end demo workload.
# 创建一个独立的 namespace 包含：
#   - prom/prometheus（带 in-cluster pod discovery）
#   - nginx + nginx-prometheus-exporter（提供可观测指标）
#   - load-generator deployment（持续打流量，便于触发 alert）
#
# 之后用 kubectl port-forward 把 Prometheus 9090 forward 出来，
# Rounds 就用 http://localhost:9090 当数据源。

apiVersion: v1
kind: Namespace
metadata:
  name: rounds-demo
---
# -- Prometheus -----------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: rounds-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-rounds-demo
rules:
  - apiGroups: [""]
    resources: [pods, services, endpoints]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-rounds-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-rounds-demo
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: rounds-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: rounds-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: rounds-demo-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [rounds-demo]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: rounds-demo
spec:
  replicas: 1
  selector:
    matchLabels: {app: prometheus}
  template:
    metadata:
      labels: {app: prometheus}
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: rounds-demo
spec:
  selector: {app: prometheus}
  ports:
    - port: 9090
      targetPort: 9090
---
# -- nginx + exporter sidecar --------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: rounds-demo
data:
  nginx.conf: |
    events {}
    http {
      log_format main '$remote_addr $status $request';
      access_log /dev/stdout main;
      server {
        listen 80;
        location /stub_status { stub_status; }
        location / { return 200 "ok\n"; }
        location /error { return 500 "boom\n"; }
        location /slow { return 200 "slow\n"; }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: rounds-demo
spec:
  replicas: 2
  selector:
    matchLabels: {app: nginx}
  template:
    metadata:
      labels: {app: nginx}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx
        - name: exporter
          image: nginx/nginx-prometheus-exporter:1.1.0
          args: [-nginx.scrape-uri=http://localhost/stub_status]
          ports:
            - containerPort: 9113
      volumes:
        - name: conf
          configMap:
            name: nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: rounds-demo
spec:
  selector: {app: nginx}
  ports:
    - port: 80
      targetPort: 80
---
# -- background load generator -------------------------------------------
# Hits / every 0.5s + /error every 5s. Gives you steady traffic + a low
# baseline error rate. Scale this deploy up / curl manually to spike.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load
  namespace: rounds-demo
spec:
  replicas: 1
  selector:
    matchLabels: {app: load}
  template:
    metadata:
      labels: {app: load}
    spec:
      containers:
        - name: curl
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              while true; do
                wget -q -O- http://nginx.rounds-demo/ >/dev/null
                wget -q -O- http://nginx.rounds-demo/error >/dev/null 2>&1 || true
                sleep 0.5
              done
