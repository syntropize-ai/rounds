replicaCount: 1

image:
  repository: ghcr.io/openobs/openobs
  # Empty defaults to .Chart.AppVersion.
  tag: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 10001

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: openobs.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  # Used only when secretEnv.DATABASE_URL is empty. For production Kubernetes,
  # prefer external Postgres and keep this PVC for temporary/local state only.
  enabled: true
  existingClaim: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  storageClassName: ""
  mountPath: /var/lib/openobs

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

env:
  NODE_ENV: production
  HOST: 0.0.0.0
  PORT: "3000"
  DATA_DIR: /var/lib/openobs
  LOG_LEVEL: info
  LOG_FORMAT: json
  CORS_ORIGINS: ""
  LLM_PROVIDER: anthropic
  LLM_MODEL: claude-sonnet-4-6
  LLM_FALLBACK_PROVIDER: ""
  DATABASE_POOL_SIZE: "10"
  DATABASE_SSL: "false"
  REDIS_PREFIX: "agentic"
  API_KEY_HEADER: x-api-key
  SESSION_TTL: "86400"
  PROACTIVE_CHECK_INTERVAL_MS: "60000"
  PROACTIVE_HISTORY_SIZE: "100"
  # In-cluster datasources (e.g. http://prometheus.monitoring:9090) resolve
  # to RFC1918 addresses; the helm chart targets self-hosted operators, so
  # default to permissive. Set to "false" for multi-tenant / public deploys.
  OPENOBS_ALLOW_PRIVATE_URLS: "true"
  extra: {}

secretEnv:
  # Empty strings trigger the chart to auto-generate on first install
  # and preserve on upgrade (see templates/secret.yaml lookup logic).
  # Operators who want to pin explicit values can set them here or
  # point to an existing Kubernetes Secret via `existingSecret`.
  JWT_SECRET: ""
  SECRET_KEY: ""
  LLM_API_KEY: ""
  API_KEYS: ""
  # Set before first startup to use the full Postgres repository backend.
  # Leave empty for local SQLite on the persistence PVC.
  DATABASE_URL: ""
  REDIS_URL: ""
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GEMINI_API_KEY: ""
  SEED_ADMIN: ""
  SEED_ADMIN_EMAIL: ""
  SEED_ADMIN_PASSWORD: ""

existingSecret: ""
