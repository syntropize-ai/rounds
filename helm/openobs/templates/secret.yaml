{{- if not .Values.existingSecret }}
{{- /*
  Zero-config secrets.

  On first install: auto-generate JWT_SECRET + SECRET_KEY with randAlphaNum.
  On upgrades: reuse whatever is already in the Secret so sessions and
  encrypted OAuth tokens survive. Operators can override either by setting
  .Values.secretEnv.{JWT_SECRET,SECRET_KEY} explicitly or by pointing
  .Values.existingSecret at a pre-provisioned Secret.
*/ -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (include "openobs.fullname" .) -}}
{{- $existingJwt := "" -}}
{{- $existingKey := "" -}}
{{- if and $existingSecret $existingSecret.data -}}
{{-   $existingJwt = (index $existingSecret.data "JWT_SECRET" | default "" | b64dec) -}}
{{-   $existingKey = (index $existingSecret.data "SECRET_KEY" | default "" | b64dec) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openobs.fullname" . }}
  labels:
    {{- include "openobs.labels" . | nindent 4 }}
type: Opaque
stringData:
  # JWT_SECRET + SECRET_KEY must be ≥32 chars (enforced at server startup).
  # Precedence: user-set value > existing in-cluster secret > fresh random.
  JWT_SECRET: {{ default (randAlphaNum 48) (default $existingJwt .Values.secretEnv.JWT_SECRET) | quote }}
  SECRET_KEY: {{ default (randAlphaNum 48) (default $existingKey .Values.secretEnv.SECRET_KEY) | quote }}
  {{- range $key, $value := .Values.secretEnv }}
  {{- if and (not (has $key (list "JWT_SECRET" "SECRET_KEY"))) $value }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
