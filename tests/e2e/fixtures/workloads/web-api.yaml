---
# prometheus-example-app — exposes /metrics with http_requests_total{code,method}.
# This is the test target whose metrics drop when scaled to 0 / when killed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-api
  namespace: openobs-e2e
  labels:
    app: web-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-api
  template:
    metadata:
      labels:
        app: web-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: app
          image: quay.io/brancz/prometheus-example-app:v0.5.0
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: web-api
  namespace: openobs-e2e
  labels:
    app: web-api
spec:
  type: ClusterIP
  selector:
    app: web-api
  ports:
    - name: http
      port: 8080
      targetPort: http
