# Rounds end-to-end demo workload.
# 创建一个独立的 namespace 包含：
#   - prom/prometheus（带 in-cluster pod discovery）
#   - nginx + nginx-prometheus-exporter（提供可观测指标）
#   - load-generator deployment（持续打流量，便于触发 alert）
#
# 之后用 kubectl port-forward 把 Prometheus 9090 forward 出来，
# Rounds 就用 http://localhost:9090 当数据源。

apiVersion: v1
kind: Namespace
metadata:
  name: rounds-demo
---
# -- Prometheus -----------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: rounds-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-rounds-demo
rules:
  - apiGroups: [""]
    resources: [pods, services, endpoints]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [nodes, nodes/metrics]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [nodes/proxy]
    verbs: [get]
  - nonResourceURLs: ["/metrics"]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-rounds-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-rounds-demo
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: rounds-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: rounds-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: rounds-demo-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [rounds-demo]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      - job_name: kubernetes-cadvisor
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

      - job_name: kubernetes-kubelet
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics

      - job_name: kubernetes-kubelet-resource
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/resource
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: rounds-demo
spec:
  replicas: 1
  selector:
    matchLabels: {app: prometheus}
  template:
    metadata:
      labels: {app: prometheus}
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: rounds-demo
spec:
  selector: {app: prometheus}
  ports:
    - port: 9090
      targetPort: 9090
---
# -- nginx + exporter sidecar --------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: rounds-demo
data:
  nginx.conf: |
    events {}
    http {
      log_format main '$remote_addr $status $request';
      access_log /dev/stdout main;
      server {
        listen 80;
        location /stub_status { stub_status; }
        location / { return 200 "ok\n"; }
        location /error { return 500 "boom\n"; }
        location /slow { return 200 "slow\n"; }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: rounds-demo
spec:
  replicas: 2
  selector:
    matchLabels: {app: nginx}
  template:
    metadata:
      labels: {app: nginx}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx
        - name: exporter
          image: nginx/nginx-prometheus-exporter:1.1.0
          args: [-nginx.scrape-uri=http://localhost/stub_status]
          ports:
            - containerPort: 9113
      volumes:
        - name: conf
          configMap:
            name: nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: rounds-demo
spec:
  selector: {app: nginx}
  ports:
    - port: 80
      targetPort: 80
---
# -- background load generator -------------------------------------------
# Hits / every 0.5s + /error every 5s. Gives you steady traffic + a low
# baseline error rate. Scale this deploy up / curl manually to spike.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load
  namespace: rounds-demo
spec:
  replicas: 1
  selector:
    matchLabels: {app: load}
  template:
    metadata:
      labels: {app: load}
    spec:
      containers:
        - name: curl
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              while true; do
                wget -q -O- http://nginx.rounds-demo/ >/dev/null
                wget -q -O- http://nginx.rounds-demo/error >/dev/null 2>&1 || true
                wget -q -O- http://example-app.rounds-demo:8080/ >/dev/null 2>&1 || true
                wget -q -O- http://example-app.rounds-demo:8080/err >/dev/null 2>&1 || true
                sleep 0.5
              done
---
# -- kube-state-metrics --------------------------------------------------
# Cluster-level object state: pod phase, deployment replicas, container
# restarts, etc. Scraped via pod annotations.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: rounds-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics-rounds-demo
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - secrets
      - nodes
      - pods
      - services
      - serviceaccounts
      - resourcequotas
      - replicationcontrollers
      - limitranges
      - persistentvolumeclaims
      - persistentvolumes
      - namespaces
      - endpoints
    verbs: [list, watch]
  - apiGroups: [apps]
    resources: [statefulsets, daemonsets, deployments, replicasets]
    verbs: [list, watch]
  - apiGroups: [batch]
    resources: [cronjobs, jobs]
    verbs: [list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies, ingresses]
    verbs: [list, watch]
  - apiGroups: [storage.k8s.io]
    resources: [storageclasses, volumeattachments]
    verbs: [list, watch]
  - apiGroups: [certificates.k8s.io]
    resources: [certificatesigningrequests]
    verbs: [list, watch]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [list, watch]
  - apiGroups: [admissionregistration.k8s.io]
    resources: [mutatingwebhookconfigurations, validatingwebhookconfigurations]
    verbs: [list, watch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics-rounds-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics-rounds-demo
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: rounds-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: rounds-demo
spec:
  replicas: 1
  selector:
    matchLabels: {app: kube-state-metrics}
  template:
    metadata:
      labels: {app: kube-state-metrics}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
          ports:
            - name: http-metrics
              containerPort: 8080
            - name: telemetry
              containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: rounds-demo
spec:
  selector: {app: kube-state-metrics}
  ports:
    - name: http-metrics
      port: 8080
      targetPort: 8080
---
# -- node-exporter -------------------------------------------------------
# Host-level CPU/memory/disk/network metrics. DaemonSet, one per node.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: rounds-demo
spec:
  selector:
    matchLabels: {app: node-exporter}
  template:
    metadata:
      labels: {app: node-exporter}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists
      containers:
        - name: node-exporter
          image: quay.io/prometheus/node-exporter:v1.8.2
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
          ports:
            - containerPort: 9100
              name: metrics
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              mountPropagation: HostToContainer
              readOnly: true
      volumes:
        - name: proc
          hostPath: {path: /proc}
        - name: sys
          hostPath: {path: /sys}
        - name: root
          hostPath: {path: /}
---
# -- prometheus-example-app ----------------------------------------------
# Tiny ready-made app emitting http_requests_total + duration histogram.
# Gives dashboards real RED metrics out of the box.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
  namespace: rounds-demo
spec:
  replicas: 2
  selector:
    matchLabels: {app: example-app}
  template:
    metadata:
      labels: {app: example-app}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: app
          image: quay.io/brancz/prometheus-example-app:v0.5.0
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: example-app
  namespace: rounds-demo
spec:
  selector: {app: example-app}
  ports:
    - port: 8080
      targetPort: 8080
